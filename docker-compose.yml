# Infra base (Kafka, PostgreSQL, Redis, Kafka UI).
# Para subir também os microserviços + legado-acl (demo completa):
#   docker compose -f docker-compose.yml -f docker-compose-services.yml up -d
#
# Tópicos Kafka usados pelo projeto (auto-create habilitado; lista para documentação):
#   renegociacao.proposta.criada
#   renegociacao.proposta.efetivada
#   cobranca.acao.realizada
#   pagamento.boleto.gerado
version: '3.8'
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: [ "CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 40s

  postgres-renegociacao:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: renegociacao_db
      POSTGRES_USER: renegociacao
      POSTGRES_PASSWORD: renegociacao123
    ports:
      - "5432:5432"
    volumes:
      - postgres_renegociacao_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U renegociacao -d renegociacao_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres-cobranca:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: cobranca_db
      POSTGRES_USER: cobranca
      POSTGRES_PASSWORD: cobranca123
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U cobranca -d cobranca_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres-pagamento:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: pagamento_db
      POSTGRES_USER: pagamento
      POSTGRES_PASSWORD: pagamento123
    ports:
      - "5434:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U pagamento -d pagamento_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

volumes:
  postgres_renegociacao_data:
