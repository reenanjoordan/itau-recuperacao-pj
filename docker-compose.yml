# Infra base (Kafka, PostgreSQL, Redis, Kafka UI).
# Para subir também os microserviços + legado-acl (demo completa):
#   docker compose -f docker-compose.yml -f docker-compose-services.yml up -d
#
# Tópicos Kafka usados pelo projeto (auto-create habilitado; lista para documentação):
#   renegociacao.proposta.criada
#   renegociacao.proposta.efetivada
#   cobranca.acao.realizada
#   pagamento.boleto.gerado
version: '3.8'
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: [ "CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 40s

  postgres-renegociacao:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: renegociacao_db
      POSTGRES_USER: renegociacao
      POSTGRES_PASSWORD: renegociacao123
    ports:
      - "5432:5432"
    volumes:
      - postgres_renegociacao_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U renegociacao -d renegociacao_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres-cobranca:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: cobranca_db
      POSTGRES_USER: cobranca
      POSTGRES_PASSWORD: cobranca123
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U cobranca -d cobranca_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres-pagamento:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: pagamento_db
      POSTGRES_USER: pagamento
      POSTGRES_PASSWORD: pagamento123
    ports:
      - "5434:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U pagamento -d pagamento_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  legado-acl-service:
    build:
      context: ./legado-acl-service
      dockerfile: Dockerfile
    container_name: legado-acl-service
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      kafka:
        condition: service_started

  renegociacao-service:
    build:
      context: ./renegociacao-service
      dockerfile: Dockerfile
    container_name: renegociacao-service
    ports:
      - "8082:8082"
    depends_on:
      postgres-renegociacao:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      DB_HOST: postgres-renegociacao
      DB_PORT: 5432
      DB_NAME: renegociacao_db
      DB_USER: renegociacao
      DB_PASSWORD: renegociacao123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      LEGADO_ACL_URL: http://legado-acl-service:8085
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8082/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: on-failure

volumes:
  postgres_renegociacao_data:
