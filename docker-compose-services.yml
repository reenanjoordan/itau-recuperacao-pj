version: '3.8'
services:
  legado-acl-service:
    build:
      context: ./legado-acl-service
      dockerfile: Dockerfile
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - kafka

  renegociacao-service:
    build:
      context: ./renegociacao-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      DB_HOST: postgres-renegociacao
      DB_PORT: 5432
      DB_NAME: renegociacao_db
      DB_USER: renegociacao
      DB_PASSWORD: renegociacao123
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      LEGADO_ACL_URL: http://legado-acl-service:8085
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - postgres-renegociacao
      - kafka
      - redis
      - legado-acl-service

  cobranca-service:
    build:
      context: ./cobranca-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - kafka

  pagamento-service:
    build:
      context: ./pagamento-service
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - kafka

  notificacao-service:
    build:
      context: ./notificacao-service
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - kafka
